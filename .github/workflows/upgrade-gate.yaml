name: Upgrade Gate
on:
  workflow_dispatch:
    inputs:
      playbook:
        description: "Path to playbook YAML"
        required: true
      cluster-type:
        description: "kind or ocp"
        default: "kind"
  workflow_call:
    inputs:
      playbook:
        required: true
        type: string
      cluster-type:
        default: "kind"
        type: string

jobs:
  upgrade-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build CLI
        run: make build
      - name: Provision cluster
        run: |
          if [ "${{ inputs.cluster-type }}" = "kind" ]; then
            kind create cluster --name chaos-test
          fi
      - name: Run playbook
        run: |
          bin/odh-chaos playbook run \
            --playbook "${{ inputs.playbook }}" \
            --allow-shell --skip-manual \
            --report-dir /tmp/upgrade-results/
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-results
          path: /tmp/upgrade-results/
      - name: Publish JUnit
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: /tmp/upgrade-results/*.xml
