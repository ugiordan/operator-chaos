name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run tests
        run: go test -race ./... -count=1

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run go vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6

  validate-experiments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build CLI
        run: go build -o bin/odh-chaos ./cmd/odh-chaos
      - name: Validate experiment files
        shell: bash
        run: |
          if [ ! -d experiments ]; then
            echo "ERROR: experiments/ directory not found"
            exit 1
          fi
          count=0
          status=0
          while IFS= read -r -d '' file; do
            count=$((count + 1))
            if ! bin/odh-chaos validate "$file"; then
              status=1
            fi
          done < <(find experiments \( -name '*.yaml' -o -name '*.yml' \) -print0)
          if [ "$count" -eq 0 ]; then
            echo "ERROR: no experiment YAML files found in experiments/"
            exit 1
          fi
          echo "Validated $count experiment files"
          exit "$status"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: go build -o /dev/null ./...
