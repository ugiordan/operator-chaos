operator:
  name: trustyai
  namespace: opendatahub
  repository: https://github.com/trustyai-explainability/trustyai-service-operator
  version: "2.10.0"
  platform: odh
  olmChannel: stable-2.10

components:
  - name: trustyai-service-operator-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: trustyai-service-operator-controller-manager
        namespace: opendatahub
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: trustyai-service-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: trustyai-service-operator-controller-manager
        namespace: opendatahub
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: trustyai-service-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: trustyai-service-operator-controller-manager-leader-election
        namespace: opendatahub
      - apiVersion: v1
        kind: Service
        name: trustyai-service-operator-controller-manager-metrics-service
        namespace: opendatahub
    webhooks:
      - name: vtrustyaiservice.trustyai.opendatahub.io
        type: validating
        path: /validate-trustyai-opendatahub-io-v1alpha1-trustyaiservice
    finalizers:
      - trustyai.opendatahub.io/finalizer
    dependencies:
      - modelmesh-controller
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: trustyai-service-operator-controller-manager
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
