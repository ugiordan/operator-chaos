operator:
  name: data-science-pipelines
  namespace: opendatahub
  repository: https://github.com/opendatahub-io/data-science-pipelines-operator
  version: "2.10.0"
  platform: odh
  olmChannel: stable-2.10

components:
  - name: data-science-pipelines-operator
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: data-science-pipelines-operator-controller-manager
        namespace: opendatahub
        labels:
          app.kubernetes.io/name: data-science-pipelines-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ConfigMap
        name: dspo-config
        namespace: opendatahub
      - apiVersion: v1
        kind: ServiceAccount
        name: data-science-pipelines-operator-controller-manager
        namespace: opendatahub
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: data-science-pipelines-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: f9eb95d5.opendatahub.io
        namespace: opendatahub
    finalizers:
      - datasciencepipelinesapplications.opendatahub.io/finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: data-science-pipelines-operator-controller-manager
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

  - name: ds-pipelines-webhook
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: ds-pipelines-webhook
        namespace: opendatahub
        labels:
          app: ds-pipelines-webhook
          component: data-science-pipelines
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: ds-pipelines-webhook
        namespace: opendatahub
      - apiVersion: v1
        kind: Secret
        name: ds-pipelines-webhook-tls
        namespace: opendatahub
    webhooks:
      - name: validating.pipelineversions.pipelines.kubeflow.org
        type: validating
        path: /webhooks/validate-pipelineversion
      - name: mutating.pipelineversions.pipelines.kubeflow.org
        type: mutating
        path: /webhooks/mutate-pipelineversion
    dependencies:
      - data-science-pipelines-operator
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: ds-pipelines-webhook
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
