operator:
  name: llamastack
  namespace: opendatahub
  repository: https://github.com/meta-llama/llama-stack-k8s-operator
  version: "2.10.0"
  platform: odh
  olmChannel: stable-2.10

components:
  - name: llamastack-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: llamastack-controller-manager
        namespace: opendatahub
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: llamastack
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: llamastack-controller-manager
        namespace: opendatahub
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: llamastack-controller-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: llamastack-controller-manager-leader-election
        namespace: opendatahub
      - apiVersion: v1
        kind: Service
        name: llamastack-controller-manager-metrics-service
        namespace: opendatahub
      - apiVersion: v1
        kind: ConfigMap
        name: llamastack-serving-config
        namespace: opendatahub
    webhooks:
      - name: vllamastackdistribution.meta.com
        type: validating
        path: /validate-llamastack-meta-com-v1alpha1-llamastackdistribution
    finalizers:
      - llamastack.meta.com/finalizer
    dependencies:
      - kserve-controller-manager
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: llamastack-controller-manager
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
