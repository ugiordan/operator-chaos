operator:
  name: training-operator
  namespace: opendatahub
  repository: https://github.com/kubeflow/training-operator
  version: "2.10.0"
  platform: odh
  olmChannel: stable-2.10

components:
  - name: training-operator-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: training-operator-controller-manager
        namespace: opendatahub
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: training-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: training-operator-controller-manager
        namespace: opendatahub
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: training-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: training-operator-controller-manager-leader-election
        namespace: opendatahub
      - apiVersion: v1
        kind: Service
        name: training-operator-controller-manager-metrics-service
        namespace: opendatahub
    webhooks:
      - name: vpytorchjob.kubeflow.org
        type: validating
        path: /validate-kubeflow-org-v1-pytorchjob
      - name: mpytorchjob.kubeflow.org
        type: mutating
        path: /mutate-kubeflow-org-v1-pytorchjob
    finalizers:
      - training-operator.kubeflow.org/finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: training-operator-controller-manager
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
