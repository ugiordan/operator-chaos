operator:
  name: kueue
  namespace: opendatahub
  repository: https://github.com/kubernetes-sigs/kueue
  version: "2.10.0"
  platform: odh
  olmChannel: stable-2.10

components:
  - name: kueue-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: kueue-controller-manager
        namespace: opendatahub
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: kueue
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: kueue-controller-manager
        namespace: opendatahub
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: kueue-controller-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: kueue-controller-manager-leader-election
        namespace: opendatahub
      - apiVersion: v1
        kind: Service
        name: kueue-controller-manager-metrics-service
        namespace: opendatahub
    webhooks:
      - name: vworkload.kb.io
        type: validating
        path: /validate-kueue-x-k8s-io-v1beta1-workload
      - name: vclusterqueue.kb.io
        type: validating
        path: /validate-kueue-x-k8s-io-v1beta1-clusterqueue
      - name: vlocalqueue.kb.io
        type: validating
        path: /validate-kueue-x-k8s-io-v1beta1-localqueue
      - name: vresourceflavor.kb.io
        type: validating
        path: /validate-kueue-x-k8s-io-v1beta1-resourceflavor
      - name: mworkload.kb.io
        type: mutating
        path: /mutate-kueue-x-k8s-io-v1beta1-workload
    finalizers:
      - kueue.x-k8s.io/managed-resources
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: kueue-controller-manager
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
