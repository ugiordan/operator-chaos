operator:
  name: dashboard
  namespace: opendatahub
  repository: https://github.com/opendatahub-io/odh-dashboard
  version: "2.10.0"
  platform: odh
  olmChannel: stable-2.10

components:
  - name: odh-dashboard
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: odh-dashboard
        namespace: opendatahub
        labels:
          deployment: odh-dashboard
          app: odh-dashboard
          app.kubernetes.io/part-of: odh-dashboard
        expectedSpec:
          replicas: 2
      - apiVersion: v1
        kind: ServiceAccount
        name: odh-dashboard
        namespace: opendatahub
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: odh-dashboard
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: odh-dashboard-auth-delegator
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: odh-dashboard-monitoring
      - apiVersion: v1
        kind: Service
        name: odh-dashboard
        namespace: opendatahub
      - apiVersion: v1
        kind: ConfigMap
        name: kube-rbac-proxy-config
        namespace: opendatahub
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: odh-dashboard
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
