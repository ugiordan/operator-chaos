operator:
  name: feast
  namespace: opendatahub
  repository: https://github.com/feast-dev/feast
  version: "2.10.0"
  platform: odh
  olmChannel: stable-2.10

components:
  - name: feast-operator-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: feast-operator-controller-manager
        namespace: opendatahub
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: feast-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: feast-operator-controller-manager
        namespace: opendatahub
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: feast-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: feast-operator-controller-manager-leader-election
        namespace: opendatahub
      - apiVersion: v1
        kind: Service
        name: feast-operator-controller-manager-metrics-service
        namespace: opendatahub
    webhooks:
      - name: vfeaturestore.feast.dev
        type: validating
        path: /validate-feast-dev-v1alpha1-featurestore
    finalizers:
      - feast.dev/finalizer
    dependencies:
      - data-science-pipelines-operator
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: feast-operator-controller-manager
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
