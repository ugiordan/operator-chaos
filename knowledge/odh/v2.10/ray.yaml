operator:
  name: ray
  namespace: opendatahub
  repository: https://github.com/ray-project/kuberay
  version: "2.10.0"
  platform: odh
  olmChannel: stable-2.10

components:
  - name: ray-operator-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: ray-operator-controller-manager
        namespace: opendatahub
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: kuberay-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: ray-operator-controller-manager
        namespace: opendatahub
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: ray-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: ray-operator-controller-manager-leader-election
        namespace: opendatahub
      - apiVersion: v1
        kind: Service
        name: ray-operator-controller-manager-metrics-service
        namespace: opendatahub
    webhooks:
      - name: vraycluster.ray.io
        type: validating
        path: /validate-ray-io-v1-raycluster
    finalizers:
      - ray.io/finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: ray-operator-controller-manager
          namespace: opendatahub
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
