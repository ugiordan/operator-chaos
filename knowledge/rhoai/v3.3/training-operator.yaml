operator:
  name: training-operator
  namespace: redhat-ods-applications
  repository: https://github.com/kubeflow/training-operator
  version: "3.3.1"
  platform: rhoai
  olmChannel: stable-3.3

components:
  - name: kubeflow-training-operator
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: kubeflow-training-operator
        namespace: redhat-ods-applications
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: training-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: kubeflow-training-operator
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: kubeflow-training-operator
      - apiVersion: v1
        kind: Service
        name: kubeflow-training-operator
        namespace: redhat-ods-applications
    webhooks:
      - name: vpytorchjob.kubeflow.org
        type: validating
        path: /validate-kubeflow-org-v1-pytorchjob
      - name: mpytorchjob.kubeflow.org
        type: mutating
        path: /mutate-kubeflow-org-v1-pytorchjob
    finalizers:
      - training-operator.kubeflow.org/finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: kubeflow-training-operator
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
