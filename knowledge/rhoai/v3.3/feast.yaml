operator:
  name: feast
  namespace: redhat-ods-applications
  repository: https://github.com/feast-dev/feast
  version: "3.3.1"
  platform: rhoai
  olmChannel: stable-3.3

components:
  - name: feast-operator-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: feast-operator-controller-manager
        namespace: redhat-ods-applications
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: feast-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: feast-operator-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: feast-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: 66483dbd.feast.dev
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: Service
        name: feast-operator-controller-manager-metrics-service
        namespace: redhat-ods-applications
    webhooks:
      - name: vfeaturestore.feast.dev
        type: validating
        path: /validate-feast-dev-v1alpha1-featurestore
    finalizers:
      - feast.dev/finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: feast-operator-controller-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
