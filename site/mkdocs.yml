site_name: ODH Platform Chaos
site_url: https://ugiordan.github.io/odh-platform-chaos
repo_url: https://github.com/ugiordan/odh-platform-chaos
repo_name: ugiordan/odh-platform-chaos
edit_uri: edit/main/site/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - mkdocstrings:
      handlers:
        go:
          options:
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - CLI Quick Start: getting-started/cli-quickstart.md
    - SDK Quick Start: getting-started/sdk-quickstart.md
    - Fuzz Quick Start: getting-started/fuzz-quickstart.md
  - Guides:
    - E2E Testing: guides/e2e-testing.md
    - CI Integration: guides/ci-integration.md
    - Dashboard: guides/dashboard.md
    - Knowledge Models: guides/knowledge-models.md
    - Controller Mode: guides/controller-mode.md
  - Reference:
    - CRD Schema: reference/crd-schema.md
    - Go SDK: reference/go-sdk.md
    - CLI Commands: reference/cli-commands.md
    - Experiment Types: reference/experiment-types.md
  - Architecture:
    - Design Overview: architecture/overview.md
    - Injection Engine: architecture/injection-engine.md
    - Observer & Blackboard: architecture/observer-blackboard.md
  - Contributing:
    - Development Setup: contributing/development-setup.md
    - Adding Injection Types: contributing/adding-injection-types.md
