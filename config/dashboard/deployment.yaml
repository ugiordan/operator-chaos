apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-chaos-dashboard
  labels:
    app.kubernetes.io/name: operator-chaos-dashboard
    app.kubernetes.io/part-of: operator-chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: operator-chaos-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: operator-chaos-dashboard
        app.kubernetes.io/part-of: operator-chaos
    spec:
      serviceAccountName: operator-chaos-dashboard
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: quay.io/operator-chaos/operator-chaos-dashboard:latest
          args:
            - -addr=:8080
            - -db=/data/dashboard.db
            - -knowledge-dir=/knowledge
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/overview/stats
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: knowledge
              mountPath: /knowledge
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: operator-chaos-dashboard-data
        - name: knowledge
          configMap:
            name: operator-chaos-knowledge
            optional: true
