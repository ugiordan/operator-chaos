apiVersion: chaos.opendatahub.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: odh-model-controller-serviceaccount-delete
spec:
  target:
    operator: odh-model-controller
    component: odh-model-controller
    resource: ServiceAccount/odh-model-controller
  steadyState:
    checks:
      - type: resourceExists
        apiVersion: v1
        kind: ServiceAccount
        name: odh-model-controller
        namespace: opendatahub
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "v1"
      kind: "ServiceAccount"
      name: "odh-model-controller"
      field: "automountServiceAccountToken"
      value: "false"
    ttl: "300s"
  hypothesis:
    description: >-
      Operator recreates ServiceAccount and controller recovers API auth
      within 120s.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - opendatahub
    allowDangerous: true
