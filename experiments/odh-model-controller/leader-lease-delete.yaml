apiVersion: chaos.opendatahub.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: odh-model-controller-leader-lease-delete
spec:
  target:
    operator: odh-model-controller
    component: odh-model-controller
    resource: Lease/odh-model-controller-leader-election
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: odh-model-controller
        namespace: opendatahub
        conditionType: Available
    timeout: "30s"
  injection:
    type: FinalizerBlock
    parameters:
      kind: Lease
      apiVersion: coordination.k8s.io/v1
      name: odh-model-controller-leader-election
    ttl: "120s"
  hypothesis:
    description: >-
      Controller re-elects leader and resumes reconciliation within 60s
      after lease is blocked.
    recoveryTimeout: 60s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - opendatahub
