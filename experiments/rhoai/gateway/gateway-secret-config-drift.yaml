apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-gateway-oauth-client-id-drift
spec:
  tier: 2
  target:
    operator: opendatahub-operator
    component: gateway-controller
    resource: Secret/kube-auth-proxy-creds
  steadyState:
    checks:
      - type: resourceExists
        apiVersion: v1
        kind: Secret
        name: kube-auth-proxy-creds
        namespace: openshift-ingress
      - type: fieldEquals
        apiVersion: v1
        kind: Secret
        name: kube-auth-proxy-creds
        namespace: openshift-ingress
        fieldPath: data.OAUTH2_PROXY_CLIENT_ID
        expectedValue: ZGF0YS1zY2llbmNl
    timeout: "30s"
  injection:
    type: ConfigDrift
    dangerLevel: high
    parameters:
      name: kube-auth-proxy-creds
      resourceType: Secret
      key: OAUTH2_PROXY_CLIENT_ID
      value: odh
    ttl: "300s"
  hypothesis:
    description: >-
      Mutating the OAUTH2_PROXY_CLIENT_ID in the kube-auth-proxy-creds
      Secret from "data-science" to "odh" simulates the stale state left
      behind after a RHOAI 3.3 to 3.4 upgrade. A resilient gateway
      controller should detect that the client ID has drifted from the
      expected value and restore it to "data-science". If the controller
      does not correct the drift, OAuth authentication will break.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-ingress
