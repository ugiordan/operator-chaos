apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-route-backend-disruption
spec:
  tier: 3
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: Route/rhods-dashboard
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "rhods-dashboard"
      path: "spec.to.name"
      value: "chaos-nonexistent-service"
    ttl: "300s"
  hypothesis:
    description: >-
      Changing the Route backend service name to a non-existent service
      simulates route admission denial at the backend level. The Route
      remains admitted by the router, but all requests return 503 because
      the backend cannot be resolved. The RHOAI operator should detect
      the broken backend reference and reconcile the Route to point to
      the correct service. Expected verdict: Resilient if the operator
      restores the backend, Vulnerable if requests continue to fail.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
    allowDangerous: true
