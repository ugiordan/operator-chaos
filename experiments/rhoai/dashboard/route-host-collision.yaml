apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-route-host-collision
spec:
  tier: 3
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: Route/rhods-dashboard
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "rhods-dashboard"
      path: "spec.host"
      value: "chaos-collision.apps.cluster.invalid"
    ttl: "300s"
  hypothesis:
    description: >-
      Mutating the RHODS dashboard Route host to a non-matching domain
      simulates a host collision or DNS misconfiguration. The OpenShift
      router will re-evaluate the Route and may reject or de-admit it.
      The RHOAI operator should detect the Route drift and reconcile
      the host back to its correct value. Expected verdict: Resilient
      if the operator restores the Route, Vulnerable if the Route
      remains misconfigured.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
    allowDangerous: true
