apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-network-partition
spec:
  tier: 2
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: Deployment/rhods-dashboard
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: NetworkPartition
    parameters:
      labelSelector: app=rhods-dashboard
    count: 1
    ttl: "120s"
  hypothesis:
    description: >-
      When network traffic to rhods-dashboard pods is blocked via
      NetworkPolicy, the dashboard should become unavailable but recover
      once the policy is removed.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 5
    allowedNamespaces:
      - redhat-ods-applications
