apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-route-shard-mismatch
spec:
  tier: 3
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: Route/rhods-dashboard
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "rhods-dashboard"
      path: "spec.host"
      value: "dashboard.nonexistent-shard.local"
    ttl: "300s"
  hypothesis:
    description: >-
      Setting spec.host to a domain that does not match any configured
      IngressController domain simulates a router shard misconfiguration.
      Unlike host-collision (which uses a cluster-like domain), this
      targets a completely non-routable local domain. No IngressController
      will claim the Route, making the dashboard unreachable. The RHOAI
      operator should detect the Route drift and restore the original
      host. Expected verdict: Resilient if the operator restores the
      host, Vulnerable if the Route remains orphaned.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
    allowDangerous: true
