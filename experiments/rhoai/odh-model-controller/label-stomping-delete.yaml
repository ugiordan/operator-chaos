apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-odh-model-controller-label-stomping-delete
spec:
  tier: 3
  target:
    operator: odh-model-controller
    component: odh-model-controller
    resource: Deployment/odh-model-controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: odh-model-controller
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: LabelStomping
    parameters:
      apiVersion: apps/v1
      kind: Deployment
      name: odh-model-controller
      labelKey: control-plane
      action: delete
    count: 1
    ttl: "300s"
  hypothesis:
    description: >-
      When the 'control-plane' label is deleted from the odh-model-controller
      Deployment, the DSC operator should detect the missing label and
      restore it during reconciliation.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
