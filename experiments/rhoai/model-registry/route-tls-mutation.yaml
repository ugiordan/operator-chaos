apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-model-registry-route-tls-mutation
spec:
  tier: 3
  target:
    operator: model-registry
    component: model-registry-operator
    resource: Route/model-registry-operator-rest
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: model-registry-operator-controller-manager
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "model-registry-operator-rest"
      path: "spec.tls.termination"
      value: "passthrough"
    ttl: "300s"
  hypothesis:
    description: >-
      Changing TLS termination on the model-registry REST Route from
      edge/reencrypt to passthrough breaks HTTPS access. The operator
      should detect the drift and restore TLS settings. Expected verdict:
      Resilient if restored, Vulnerable if the API stays broken.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
    allowDangerous: true
